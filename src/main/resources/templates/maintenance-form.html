<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title th:text="${pageTitle}">Maintenance Form</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container-fluid">
        <a class="navbar-brand" href="/dashboard">IT Hardware Inventory</a>

        <div class="collapse navbar-collapse">
            <ul class="navbar-nav me-auto">
                <li class="nav-item">
                    <a class="nav-link" href="/dashboard">Dashboard</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/assets">Assets</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/parts">Parts</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/maintenance">Maintenance</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/users">Users</a>
                </li>
            </ul>

            <form th:action="@{/logout}" method="post" style="display:inline;">
                <button type="submit" class="btn btn-danger btn-sm">Logout</button>
            </form>
        </div>
    </div>
</nav>
<div class="container mt-4">
    <h2 th:text="${pageTitle}">Maintenance Form</h2>

    <form th:action="${maintenance.id != null} ? @{/maintenance/update/{id}(id=${maintenance.id})} : @{/maintenance/save}"
          method="post">

        <div class="row">

            <div class="col-md-6 mb-3">
                <label>Select Asset</label>
                <select name="assetId" class="form-control" required>
                    <option value="">-- Select Asset --</option>
                    <option th:each="asset : ${assets}"
                            th:value="${asset.id}"
                            th:text="${asset.assetName + ' - ' + asset.assetType}"
                            th:selected="${maintenance.asset != null and maintenance.asset.id == asset.id}">
                    </option>
                </select>
            </div>

            <div class="col-md-6 mb-3">
                <label>Issue Description</label>
                <input type="text" name="issueDescription" class="form-control"
                       th:value="${maintenance.issueDescription}" required>
            </div>

            <div class="col-md-6 mb-3">
                <label>Maintenance Date</label>
                <input type="date" name="maintenanceDate" class="form-control"
                       th:value="${maintenance.maintenanceDate}" required>
            </div>

            <div class="col-md-6 mb-3">
                <label>Technician / Vendor</label>
                <input type="text" name="technician" class="form-control"
                       th:value="${maintenance.technician}" required>
            </div>

            <div class="col-md-6 mb-3">
                <label>Cost</label>
                <input type="number" step="0.01" name="cost" class="form-control"
                       th:value="${maintenance.cost}" required>
            </div>

            <div class="col-md-6 mb-3">
                <label>Status</label>
                <select name="status" class="form-control" required>
                    <option value="Pending" th:selected="${maintenance.status == 'Pending'}">Pending</option>
                    <option value="In Progress" th:selected="${maintenance.status == 'In Progress'}">In Progress</option>
                    <option value="Completed" th:selected="${maintenance.status == 'Completed'}">Completed</option>
                </select>
            </div>
        </div>

        <button type="submit" class="btn btn-success"
                th:text="${maintenance.id != null ? 'Update Maintenance' : 'Save Maintenance'}">
            Save
        </button>

        <a th:href="@{/maintenance}" class="btn btn-secondary">Back</a>
    </form>
</div>
</body>
</html>
