<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <title th:text="${pageTitle}">User Form</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container-fluid">
        <a class="navbar-brand" href="/dashboard">IT Hardware Inventory</a>

        <div class="collapse navbar-collapse">
            <ul class="navbar-nav me-auto">
                <li class="nav-item"><a class="nav-link" href="/dashboard">Dashboard</a></li>
                <li class="nav-item"><a class="nav-link" href="/assets">Assets</a></li>
                <li class="nav-item"><a class="nav-link" href="/parts">Parts</a></li>
                <li class="nav-item"><a class="nav-link" href="/maintenance">Maintenance</a></li>
                <li class="nav-item"><a class="nav-link active" href="/users">Users</a></li>
            </ul>

            <form th:action="@{/logout}" method="post" style="display:inline;">
                <button type="submit" class="btn btn-danger btn-sm">Logout</button>
            </form>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <h2 th:text="${pageTitle}">User Form</h2>

    <form th:action="@{/users/save}" th:object="${user}" method="post">
        <input type="hidden" th:field="*{id}">

        <div class="col-md-6 mb-3">
            <label>Username</label>
            <input type="text" th:field="*{username}" class="form-control" required>
        </div>

        <div class="col-md-6 mb-3">
            <label>Password</label>
            <input type="password" th:field="*{password}" class="form-control"
                   placeholder="Leave blank to keep existing password">
        </div>

        <div class="col-md-6 mb-3">
            <label>Email</label>
            <input type="email" th:field="*{email}" class="form-control" required>
        </div>

        <!-- Role editable only by MANAGER -->
        <div class="col-md-6 mb-3" sec:authorize="hasRole('MANAGER')">
            <label>Role</label>
            <select th:field="*{role}" class="form-control" required>
                <option th:each="role : ${roles}"
                        th:value="${role}"
                        th:text="${role}">
                </option>
            </select>
        </div>

        <!-- For non-managers: keep existing role unchanged -->
        <div class="col-md-6 mb-3" sec:authorize="!hasRole('MANAGER')">
            <label>Role</label>
            <input type="text" th:value="${user.role}" class="form-control" readonly>
            <input type="hidden" th:field="*{role}">
        </div>

        <button type="submit" class="btn btn-success">Save User</button>
        <a th:href="@{/users}" class="btn btn-secondary">Back</a>
    </form>
</div>

</body>
</html>
