<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <title>Maintenance Records</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container-fluid">
        <a class="navbar-brand" href="/dashboard">IT Hardware Inventory</a>

        <div class="collapse navbar-collapse">
            <ul class="navbar-nav me-auto">
                <li class="nav-item">
                    <a class="nav-link" href="/dashboard">Dashboard</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/assets">Assets</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/parts">Parts</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/maintenance">Maintenance</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/users">Users</a>
                </li>
            </ul>

            <form th:action="@{/logout}" method="post" style="display:inline;">
                <button type="submit" class="btn btn-danger btn-sm">Logout</button>
            </form>
        </div>
    </div>
</nav>
<div class="container mt-4">
    <h2>Maintenance Records</h2>
    <form th:action="@{/maintenance}" method="get" class="row mb-3">

        <div class="col-md-8">
            <input type="text"
                   name="keyword"
                   class="form-control"
                   placeholder="Search by Asset, Technician or Status..."
                   th:value="${keyword}">
        </div>

        <div class="col-md-2 d-grid">
            <button type="submit" class="btn btn-primary">
                Search
            </button>
        </div>

        <div class="col-md-2 d-grid">
            <a th:href="@{/maintenance}" class="btn btn-secondary">
                Reset
            </a>
        </div>

    </form>

    <!-- Only MANAGER can add -->
    <div sec:authorize="hasRole('MANAGER')">
        <a th:href="@{/maintenance/new}" class="btn btn-primary mb-3">Add Maintenance Record</a>
    </div>

    <table class="table table-bordered table-striped">
        <thead class="table-dark">
        <tr>
            <th>ID</th>
            <th>Asset</th>
            <th>Issue Description</th>
            <th>Maintenance Date</th>
            <th>Technician</th>
            <th>Cost</th>
            <th>Status</th>
            <th sec:authorize="hasRole('MANAGER')">Actions</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="record : ${maintenanceRecords}">
            <td th:text="${record.id}"></td>
            <td th:text="${record.asset.assetName}"></td>
            <td th:text="${record.issueDescription}"></td>
            <td th:text="${record.maintenanceDate}"></td>
            <td th:text="${record.technician}"></td>
            <td th:text="${record.cost}"></td>
            <td th:text="${record.status}"></td>

            <!-- Only MANAGER can edit/delete -->
            <td sec:authorize="hasRole('MANAGER')">
                <a th:href="@{/maintenance/edit/{id}(id=${record.id})}" class="btn btn-warning btn-sm">Edit</a>
                <a th:href="@{/maintenance/delete/{id}(id=${record.id})}"
                   class="btn btn-danger btn-sm"
                   onclick="return confirm('Are you sure you want to delete this maintenance record?')">Delete</a>
            </td>
        </tr>
        </tbody>
    </table>

    <a href="/dashboard" class="btn btn-secondary">Back to Dashboard</a>
</div>
</body>
</html>
