<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Update Profile</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>
<div class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-md-5">
      <div class="card shadow-sm">
        <div class="card-header bg-success text-white">
          <h5 class="mb-0">Update Profile</h5>
        </div>
        <div class="card-body">

          <!-- Error message -->
          <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

          <form th:action="@{/users/update-profile/{id}(id=${user.id})}" method="post">

            <div class="mb-3">
              <label class="form-label">Username <span class="text-danger">*</span></label>
              <input type="text" name="newUsername" class="form-control"
                     th:value="${user.username}" required />
            </div>

            <div class="mb-3">
              <label class="form-label">Email <span class="text-danger">*</span></label>
              <input type="email" name="newEmail" class="form-control"
                     th:value="${user.email}" required />
            </div>

            <div class="mb-3">
              <label class="form-label">Current Password <span class="text-danger">*</span>
                <small class="text-muted">(required to confirm changes)</small>
              </label>
              <input type="password" name="currentPassword" class="form-control"
                     placeholder="Enter your current password to confirm" required />
            </div>

            <div class="d-flex gap-2">
              <button type="submit" class="btn btn-success">Update Profile</button>
              <a href="/users" class="btn btn-secondary">Cancel</a>
            </div>

          </form>
        </div>
      </div>
    </div>
  </div>
</div>
</body>
</html>
