<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <title>Assets List</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container-fluid">
        <a class="navbar-brand" href="/dashboard">IT Hardware Inventory</a>

        <div class="collapse navbar-collapse">
            <ul class="navbar-nav me-auto">
                <li class="nav-item">
                    <a class="nav-link" href="/dashboard">Dashboard</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/assets">Assets</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/parts">Parts</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/maintenance">Maintenance</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/users">Users</a>
                </li>
            </ul>

            <form th:action="@{/logout}" method="post" style="display:inline;">
                <button type="submit" class="btn btn-danger btn-sm">Logout</button>
            </form>
        </div>
    </div>
</nav>
<div class="container mt-4">
    <h2>Asset List</h2>
    <form th:action="@{/assets}" method="get" class="row mb-3">

        <div class="col-md-8">
            <input type="text"
                   name="keyword"
                   class="form-control"
                   placeholder="Search by Asset Name, Type, Brand or Status..."
                   th:value="${keyword}">
        </div>

        <div class="col-md-2 d-grid">
            <button type="submit" class="btn btn-primary">
                Search
            </button>
        </div>

        <div class="col-md-2 d-grid">
            <a th:href="@{/assets}" class="btn btn-secondary">
                Reset
            </a>
        </div>

    </form>

    <!-- Only MANAGER can see Add button -->
    <div sec:authorize="hasRole('MANAGER')">
        <a th:href="@{/assets/new}" class="btn btn-primary mb-3">Add New Asset</a>
    </div>

    <table class="table table-bordered table-striped">
        <thead class="table-dark">
        <tr>
            <th>ID</th>
            <th>Asset Name</th>
            <th>Asset Type</th>
            <th>Brand</th>
            <th>Model</th>
            <th>Serial Number</th>
            <th>Purchase Date</th>
            <th>Warranty Expiry</th>
            <th>Status</th>
            <th>Location</th>
            <th sec:authorize="hasRole('MANAGER')">Actions</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="asset : ${assets}">
            <td th:text="${asset.id}"></td>
            <td th:text="${asset.assetName}"></td>
            <td th:text="${asset.assetType}"></td>
            <td th:text="${asset.brand}"></td>
            <td th:text="${asset.model}"></td>
            <td th:text="${asset.serialNumber}"></td>
            <td th:text="${asset.purchaseDate}"></td>
            <td th:text="${asset.warrantyExpiry}"></td>
            <td th:text="${asset.status}"></td>
            <td th:text="${asset.location}"></td>

            <!-- Only MANAGER can see Edit/Delete -->
            <td sec:authorize="hasRole('MANAGER')">
                <a th:href="@{/assets/edit/{id}(id=${asset.id})}" class="btn btn-warning btn-sm">Edit</a>
                <a th:href="@{/assets/delete/{id}(id=${asset.id})}"
                   class="btn btn-danger btn-sm"
                   onclick="return confirm('Are you sure you want to delete this asset?')">Delete</a>
            </td>
        </tr>
        </tbody>
    </table>

    <a href="/dashboard" class="btn btn-secondary">Back to Dashboard</a>
</div>
</body>
</html>
