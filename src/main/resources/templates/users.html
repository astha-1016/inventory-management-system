<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <title>User Management</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container-fluid">
        <a class="navbar-brand" href="/dashboard">IT Hardware Inventory</a>
        <div class="collapse navbar-collapse">
            <ul class="navbar-nav me-auto">
                <li class="nav-item"><a class="nav-link" href="/dashboard">Dashboard</a></li>
                <li class="nav-item"><a class="nav-link" href="/assets">Assets</a></li>
                <li class="nav-item"><a class="nav-link" href="/parts">Parts</a></li>
                <li class="nav-item"><a class="nav-link" href="/maintenance">Maintenance</a></li>
                <li class="nav-item"><a class="nav-link active" href="/users">Users</a></li>
            </ul>
            <form th:action="@{/logout}" method="post" style="display:inline;">
                <button type="submit" class="btn btn-danger btn-sm">Logout</button>
            </form>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <h2>User Management</h2>

    <!-- Success/Error messages -->
    <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>
    <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

    <form th:action="@{/users}" method="get" class="row mb-3">
        <div class="col-md-8">
            <input type="text" name="keyword" class="form-control"
                   placeholder="Search by Username, Email or Role..."
                   th:value="${keyword}">
        </div>
        <div class="col-md-2 d-grid">
            <button type="submit" class="btn btn-primary">Search</button>
        </div>
        <div class="col-md-2 d-grid">
            <a th:href="@{/users}" class="btn btn-secondary">Reset</a>
        </div>
    </form>

    <div sec:authorize="hasRole('MANAGER')">
        <a th:href="@{/users/new}" class="btn btn-primary mb-3">Add New User</a>
    </div>

    <table class="table table-bordered table-striped">
        <thead class="table-dark">
        <tr>
            <th>ID</th>
            <th>Username</th>
            <th>Email</th>
            <th>Role</th>
            <th>Actions</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="user : ${users}">
            <td th:text="${user.id}"></td>
            <td th:text="${user.username}"></td>
            <td th:text="${user.email}"></td>
            <td th:text="${user.role}"></td>

            <td>
                <!-- MANAGER can edit anyone -->
                <a sec:authorize="hasRole('MANAGER')"
                   th:href="@{/users/edit/{id}(id=${user.id})}"
                   class="btn btn-warning btn-sm">Edit</a>

                <!-- VIEWER can edit only own profile -->
                <a sec:authorize="hasRole('VIEWER')"
                   th:if="${#authentication.name == user.username}"
                   th:href="@{/users/edit/{id}(id=${user.id})}"
                   class="btn btn-warning btn-sm">Edit</a>

                <!-- ✅ Change Password button — own profile or manager -->
                <a sec:authorize="hasRole('MANAGER')"
                   th:href="@{/users/change-password/{id}(id=${user.id})}"
                   class="btn btn-info btn-sm">Change Password</a>

                <a sec:authorize="hasRole('VIEWER')"
                   th:if="${#authentication.name == user.username}"
                   th:href="@{/users/change-password/{id}(id=${user.id})}"
                   class="btn btn-info btn-sm">Change Password</a>

                <!-- ✅ Update Profile button — own profile or manager -->
                <a sec:authorize="hasRole('MANAGER')"
                   th:href="@{/users/update-profile/{id}(id=${user.id})}"
                   class="btn btn-secondary btn-sm">Update Profile</a>

                <a sec:authorize="hasRole('VIEWER')"
                   th:if="${#authentication.name == user.username}"
                   th:href="@{/users/update-profile/{id}(id=${user.id})}"
                   class="btn btn-secondary btn-sm">Update Profile</a>

                <!-- ✅ DELETE via POST form — not a GET link -->
                <form sec:authorize="hasRole('MANAGER')"
                      th:action="@{/users/delete/{id}(id=${user.id})}"
                      method="post" style="display:inline;">
                    <button type="submit" class="btn btn-danger btn-sm"
                            onclick="return confirm('Are you sure you want to delete this user?')">
                        Delete
                    </button>
                </form>
            </td>
        </tr>
        </tbody>
    </table>

    <a href="/dashboard" class="btn btn-secondary">Back to Dashboard</a>
</div>
</body>
</html>
