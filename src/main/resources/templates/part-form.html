<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title th:text="${pageTitle}">Part Form</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container-fluid">
        <a class="navbar-brand" href="/dashboard">IT Hardware Inventory</a>

        <div class="collapse navbar-collapse">
            <ul class="navbar-nav me-auto">
                <li class="nav-item"><a class="nav-link" href="/dashboard">Dashboard</a></li>
                <li class="nav-item"><a class="nav-link" href="/assets">Assets</a></li>
                <li class="nav-item"><a class="nav-link active" href="/parts">Parts</a></li>
                <li class="nav-item"><a class="nav-link" href="/maintenance">Maintenance</a></li>
                <li class="nav-item"><a class="nav-link" href="/users">Users</a></li>
            </ul>

            <form th:action="@{/logout}" method="post" style="display:inline;">
                <button type="submit" class="btn btn-danger btn-sm">Logout</button>
            </form>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <h2 th:text="${pageTitle}">Add New Part</h2>

    <form th:action="@{/parts/save}" th:object="${part}" method="post">
        <input type="hidden" th:field="*{id}" />

        <div class="mb-3">
            <label class="form-label">Part Name</label>
            <input type="text" th:field="*{partName}" class="form-control" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Category</label>
            <input type="text" th:field="*{category}" class="form-control" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Quantity</label>
            <input type="number" th:field="*{quantity}" class="form-control" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Minimum Stock</label>
            <input type="number" th:field="*{minimumStock}" class="form-control" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Unit Price</label>
            <input type="number" step="0.01" th:field="*{unitPrice}" class="form-control" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Supplier</label>
            <input type="text" th:field="*{supplier}" class="form-control" required>
        </div>

        <button type="submit" class="btn btn-success">Save Part</button>
        <a th:href="@{/parts}" class="btn btn-secondary">Back</a>
    </form>
</div>

</body>
</html>
