<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title th:text="${pageTitle}">Asset Form</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container-fluid">
        <a class="navbar-brand" href="/dashboard">IT Hardware Inventory</a>

        <div class="collapse navbar-collapse">
            <ul class="navbar-nav me-auto">
                <li class="nav-item">
                    <a class="nav-link" href="/dashboard">Dashboard</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/assets">Assets</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/parts">Parts</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/maintenance">Maintenance</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/users">Users</a>
                </li>
            </ul>

            <form th:action="@{/logout}" method="post" style="display:inline;">
                <button type="submit" class="btn btn-danger btn-sm">Logout</button>
            </form>
        </div>
    </div>
</nav>
<div class="container mt-4">
    <h2 th:text="${pageTitle}">Asset Form</h2>

    <form th:action="${asset.id} != null ? @{/assets/update/{id}(id=${asset.id})} : @{/assets/save}"
          th:object="${asset}" method="post">

        <div class="row">
            <div class="col-md-6 mb-3">
                <label>Asset Name</label>
                <input type="text" th:field="*{assetName}" class="form-control" required>
            </div>

            <div class="col-md-6 mb-3">
                <label>Asset Type</label>
                <input type="text" th:field="*{assetType}" class="form-control" placeholder="Computer / Printer / Hardware" required>
            </div>

            <div class="col-md-6 mb-3">
                <label>Brand</label>
                <input type="text" th:field="*{brand}" class="form-control">
            </div>

            <div class="col-md-6 mb-3">
                <label>Model</label>
                <input type="text" th:field="*{model}" class="form-control">
            </div>

            <div class="col-md-6 mb-3">
                <label>Serial Number</label>
                <input type="text" th:field="*{serialNumber}" class="form-control">
            </div>

            <div class="col-md-6 mb-3">
                <label>Purchase Date</label>
                <input type="date" th:field="*{purchaseDate}" class="form-control">
            </div>

            <div class="col-md-6 mb-3">
                <label>Warranty Expiry</label>
                <input type="date" th:field="*{warrantyExpiry}" class="form-control">
            </div>

            <div class="col-md-6 mb-3">
                <label>Status</label>
                <select th:field="*{status}" class="form-control">
                    <option value="Available">Available</option>
                    <option value="In Use">In Use</option>
                    <option value="Under Repair">Under Repair</option>
                </select>
            </div>

            <div class="col-md-6 mb-3">
                <label>Location</label>
                <input type="text" th:field="*{location}" class="form-control">
            </div>
        </div>

        <button type="submit" class="btn btn-success"
                th:text="${asset.id} != null ? 'Update Asset' : 'Save Asset'"></button>
        <a th:href="@{/assets}" class="btn btn-secondary">Back</a>
    </form>
</div>
</body>
</html>
