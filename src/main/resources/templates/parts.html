<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <title>Parts Inventory</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container-fluid">
        <a class="navbar-brand" href="/dashboard">IT Hardware Inventory</a>
        <div class="collapse navbar-collapse">
            <ul class="navbar-nav me-auto">
                <li class="nav-item"><a class="nav-link" href="/dashboard">Dashboard</a></li>
                <li class="nav-item"><a class="nav-link" href="/assets">Assets</a></li>
                <li class="nav-item"><a class="nav-link active" href="/parts">Parts</a></li>
                <li class="nav-item"><a class="nav-link" href="/maintenance">Maintenance</a></li>
                <li class="nav-item"><a class="nav-link" href="/users">Users</a></li>
            </ul>
            <form th:action="@{/logout}" method="post">
                <button type="submit" class="btn btn-danger btn-sm">Logout</button>
            </form>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <h2>Parts / Spare Inventory</h2>

    <!-- Success/Error messages -->
    <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>
    <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

    <form th:action="@{/parts}" method="get" class="row mb-3">
        <div class="col-md-8">
            <input type="text" name="keyword" class="form-control"
                   placeholder="Search by Part Name, Category or Supplier..."
                   th:value="${keyword}">
        </div>
        <div class="col-md-2 d-grid">
            <button type="submit" class="btn btn-primary">Search</button>
        </div>
        <div class="col-md-2 d-grid">
            <a th:href="@{/parts}" class="btn btn-secondary">Reset</a>
        </div>
    </form>

    <div class="mb-3" sec:authorize="hasRole('MANAGER')">
        <a th:href="@{/parts/new}" class="btn btn-primary">Add New Part</a>
    </div>

    <table class="table table-bordered table-striped">
        <thead class="table-dark">
        <tr>
            <th>ID</th>
            <th>Part Name</th>
            <th>Category</th>
            <th>Quantity</th>
            <th>Minimum Stock</th>
            <th>Unit Price</th>
            <th>Supplier</th>
            <th sec:authorize="hasRole('MANAGER')">Actions</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="part : ${parts}">
            <td th:text="${part.id}"></td>
            <td th:text="${part.partName}"></td>
            <td th:text="${part.category}"></td>
            <td th:text="${part.quantity}"></td>
            <td th:text="${part.minimumStock}"></td>
            <td th:text="${part.unitPrice}"></td>
            <td th:text="${part.supplier}"></td>

            <td sec:authorize="hasRole('MANAGER')">
                <a th:href="@{/parts/edit/{id}(id=${part.id})}" class="btn btn-warning btn-sm">Edit</a>

                <!-- ✅ DELETE via POST form — not a GET link -->
                <form th:action="@{/parts/delete/{id}(id=${part.id})}" method="post" style="display:inline;">
                    <button type="submit" class="btn btn-danger btn-sm"
                            onclick="return confirm('Are you sure you want to delete this part?')">
                        Delete
                    </button>
                </form>
            </td>
        </tr>
        </tbody>
    </table>

    <a href="/dashboard" class="btn btn-secondary">Back to Dashboard</a>
</div>
</body>
</html>
